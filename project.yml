name: MahjTrainer
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.72.0
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  lastUpgradeCheck: "1600"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  MahjTrainer:
    type: application
    platform: iOS
    sources:
      - path: MahjTrainer
      - path: Shared
    settings:
      base:
        DEVELOPMENT_TEAM: YXG4MP6W39
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.mahj
        PRODUCT_NAME: "Mahj Trainer"
        PRODUCT_MODULE_NAME: MahjTrainer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "11"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MahjTrainer/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: RevenueCat

  MahjTrainerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MahjTrainerTests
    dependencies:
      - target: MahjTrainer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mahj Trainer.app/Mahj Trainer"

schemes:
  MahjTrainer:
    build:
      targets:
        MahjTrainer: all
    run:
      config: Debug
      storeKitConfiguration: MahjTrainer/MahjTrainer.storekit
    test:
      config: Debug
      targets:
        - MahjTrainerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
